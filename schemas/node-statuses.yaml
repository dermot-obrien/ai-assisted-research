# Node Status Lifecycle — RMS v1.2.0
#
# CANONICAL definition of all valid hypothesis node statuses.
# This is the single source of truth for status values and transitions.
#
# All agents, tools, and schemas MUST use only these statuses.

statuses:
  pending:
    description: "Not yet started. Waiting for parent resolution or agent selection."
    transitions_to: [framed, in_progress]
    color: "#94a3b8"

  framed:
    description: "Design phase complete. Scope, plan, and research context documented via /start-hypothesis. Ready for execution."
    transitions_to: [in_progress]
    color: "#a855f7"

  in_progress:
    description: "Execution phase active. Agent is running experiments and collecting results."
    transitions_to: [partially_tested, validated, ineffective, discarded]
    color: "#f59e0b"

  partially_tested:
    description: "Some experiments run with partial results. Not yet conclusive. More experiments needed to validate or reject."
    transitions_to: [validated, ineffective, discarded, in_progress]
    color: "#f97316"

  completed:
    description: "All planned experiments run with clear results. Used for non-hypothesis nodes (infrastructure, tooling) or when the result is neither clearly positive nor negative. For hypothesis nodes, prefer validated or ineffective."
    transitions_to: []
    color: "#3b82f6"

  validated:
    description: "Hypothesis confirmed. Actual performance meets or exceeds target. Evidence recorded."
    transitions_to: [contested]
    color: "#22c55e"

  contested:
    description: "Previously validated or partially_tested, but later observations during experimentation raised concerns about the validity of the results. The methodology, data handling, or evaluation approach may have been flawed. The hypothesis is not necessarily wrong — the evidence supporting it is unreliable and needs re-evaluation with corrected methodology. Nodes transition here when audit findings emerge naturally during the research process (not from a separate audit activity). A contested node should document: (1) what was originally claimed, (2) what concern was raised, (3) what remediation is needed, (4) the experiment where the concern was identified. Contested nodes may transition back to validated after re-evaluation with corrected methodology, or to ineffective if re-evaluation shows no effect."
    transitions_to: [validated, ineffective, in_progress]
    color: "#f59e0b"
    icon: "⚠"

  ineffective:
    description: "Hypothesis rejected. Experiments show the approach does not work or does not improve on baseline."
    transitions_to: []
    color: "#ef4444"

  discarded:
    description: "Research stopped early. May be due to external factors, pivots, or superseded by another hypothesis."
    transitions_to: []
    color: "#64748b"

# Lifecycle diagram:
#
#   pending --> framed --> in_progress --> partially_tested --> validated
#                |              |                |           --> ineffective
#                |              |                |           --> discarded
#                |              +--> validated -----> contested
#                |              +--> ineffective         |
#                |              +--> discarded           +--> validated (re-validated)
#                +--> in_progress (skip framing)         +--> ineffective
#                                                        +--> in_progress (re-evaluation)
#
# Node readiness for child nodes:
#   A child node is READY when ALL parents are in a terminal status:
#   validated, ineffective, completed, or discarded.
#   contested is NOT terminal — children should treat it as blocking
#   until the contest is resolved.

# Audit findings field (added to hypothesis node schema):
#
# audit_findings:
#   type: array
#   required: false
#   description: "Observations that call into question the validity of this node's
#     results. May originate from: (a) the experimenting agent noticing issues
#     during normal work, (b) an auditor reviewing the hypothesis/experiment,
#     (c) a later experiment whose results contradict this node's claims.
#     The source is recorded in 'source' and 'auditor_notes'."
#   items:
#     noted_in_experiment: integer  # Experiment where the concern was first observed
#     severity: string              # critical | major | medium
#     source: string                # "self" (agent noticed) | "auditor" (external review) | "experiment" (later result contradicts)
#     finding: string               # What was observed
#     auditor_notes: string         # Verbatim feedback from the auditor (null if self-identified). Placeholder for auditor to fill in.
#     resolution: string            # How resolved, or null if open
#     resolved_by_experiment: integer  # Experiment that resolved it, or null
